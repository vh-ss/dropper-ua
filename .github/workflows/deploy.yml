name: Deploy Dropper UA to GitHub Pages

# Публікація через GitHub Actions (як у MoneyMe — не через legacy-білдер гілки).
# Два окремі job: build збирає готовий статичний сайт як артефакт, deploy його публікує.
# Розділення важливе: повторний запуск лише deploy-джоба (при транзієнтному «Deployment failed,
# try again later» від Pages) НЕ переззбирає артефакт → немає помилки «Multiple artifacts found».
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html .nojekyll manifest.webmanifest sw.js _site/
          cp "Інструкція-користувача.html" _site/
          cp -r help-img icons _site/
          # штампуємо версію коротким git-хешем (як у MoneyMe) — у показ APP_VERSION і в кеш SW BUILD
          SHA="$(git rev-parse --short HEAD)"
          sed -i "s/const APP_VERSION=\"[^\"]*\"/const APP_VERSION=\"$SHA\"/" _site/index.html
          sed -i "s/const BUILD = '[^']*'/const BUILD = '$SHA'/" _site/sw.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
